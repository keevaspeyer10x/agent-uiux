name: minds Code Review (Required)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  minds-review:
    name: Multi-Model Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Run minds review via intrepid
        env:
          SSH_PRIVATE_KEY: ${{ secrets.INTREPID_SSH_KEY }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/intrepid_key
          chmod 600 ~/.ssh/intrepid_key
          ssh-keyscan -H hermes.keeva.space >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/intrepid_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              keeva@hermes.keeva.space \
              "bash -lc '/home/keeva/.local/bin/minds-review-gate --repo $REPO --pr $PR'"
